<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Sourcerer</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/js-yaml@4/dist/js-yaml.min.js"></script>
<style>
/* ── Reset & Base ─────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root, [data-theme="dark"] {
    --bg:           #0f1117;
    --bg-card:      #1a1d27;
    --bg-hover:     #22252f;
    --border:       #2a2d3a;
    --text:         #e4e4e7;
    --text-muted:   #71717a;
    --type-rss:     #22c55e;
    --type-sitemap: #a855f7;
    --type-podcast: #f97316;
    --st-pass:      #71717a;
    --st-save:      #3b82f6;
    --st-star:      #eab308;
}
[data-theme="light"] {
    --bg:           #f8f9fa;
    --bg-card:      #ffffff;
    --bg-hover:     #f0f1f3;
    --border:       #d4d4d8;
    --text:         #18181b;
    --text-muted:   #71717a;
    --type-rss:     #16a34a;
    --type-sitemap: #9333ea;
    --type-podcast: #ea580c;
    --st-pass:      #a1a1aa;
    --st-save:      #2563eb;
    --st-star:      #ca8a04;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
}

a { color: var(--st-save); text-decoration: none; }
a:hover { text-decoration: underline; }

/* ── Header ───────────────────────────────────────────────────── */
#header {
    position: sticky; top: 0; z-index: 100;
    background: var(--bg-card);
    border-bottom: 1px solid var(--border);
    padding: 10px 24px;
    display: flex; flex-direction: column; gap: 6px;
    flex-shrink: 0;
}
#header h1 { font-size: 16px; font-weight: 700; white-space: nowrap; }
.header-row { display: flex; justify-content: space-between; align-items: center; width: 100%; }
.review-counter { font-size: 13px; color: var(--text-muted); }

.branch-select {
    background: var(--bg); border: 1px solid var(--border);
    color: var(--text); padding: 5px 8px; border-radius: 6px;
    font-size: 12px; outline: none; max-width: 180px;
}
.branch-select:focus { border-color: var(--st-save); }

.theme-toggle, .settings-toggle {
    background: none; border: 1px solid var(--border); color: var(--text-muted);
    font-size: 18px; width: 30px; height: 30px; border-radius: 6px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all .15s; line-height: 1;
}
.theme-toggle { font-size: 22px; }
.theme-toggle:hover, .settings-toggle:hover { color: var(--text); background: var(--bg-hover); }
.settings-toggle { font-size: 16px; }

.nav-btn {
    background: none; border: none; color: var(--text-muted);
    font-size: 13px; font-weight: 500; padding: 6px 14px;
    cursor: pointer; border-radius: 6px; transition: all .15s;
}
.nav-btn:hover { color: var(--text); background: var(--bg-hover); }
.nav-btn.active { background: var(--bg-hover); color: var(--text); }

/* ── Settings panel ──────────────────────────────────────────── */
.settings-overlay {
    display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,.5); z-index: 200;
}
.settings-overlay.open { display: flex; align-items: center; justify-content: center; }
.settings-panel {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 12px; padding: 24px; width: 90%; max-width: 420px;
}
.settings-panel h2 { font-size: 16px; margin-bottom: 16px; }
.settings-panel label { display: block; font-size: 13px; color: var(--text-muted); margin-bottom: 4px; }
.settings-panel input[type="text"], .settings-panel input[type="password"] {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    color: var(--text); padding: 8px 10px; border-radius: 6px;
    font-size: 13px; outline: none; margin-bottom: 12px;
}
.settings-panel input:focus { border-color: var(--st-save); }
.settings-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 8px; }
.settings-actions button {
    padding: 8px 18px; border-radius: 6px; font-size: 13px; cursor: pointer;
    border: 1px solid var(--border); background: var(--bg); color: var(--text);
}
.settings-actions button.primary { background: var(--st-save); color: #fff; border-color: var(--st-save); }
.settings-actions button:hover { opacity: .9; }
.settings-status { font-size: 12px; margin-top: 8px; }
.settings-status.ok { color: var(--type-rss); }
.settings-status.err { color: #ef4444; }

/* ── Loading overlay ─────────────────────────────────────────── */
.loading-banner {
    display: none; padding: 12px 24px; text-align: center;
    font-size: 13px; color: var(--text-muted);
    background: var(--bg-card); border-bottom: 1px solid var(--border);
}
.loading-banner.active { display: block; }

/* ── Warning banner ──────────────────────────────────────────── */
.warning-banner {
    display: none; padding: 8px 24px; text-align: center;
    font-size: 12px; color: #f59e0b;
    background: rgba(245,158,11,.08); border-bottom: 1px solid rgba(245,158,11,.2);
}
.warning-banner.active { display: block; }

/* ── Filters ──────────────────────────────────────────────────── */
.filters-bar {
    display: flex; gap: 10px; padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--bg-card); flex-wrap: wrap;
}
.filters-bar select, .filters-bar input {
    background: var(--bg); border: 1px solid var(--border);
    color: var(--text); padding: 7px 10px; border-radius: 6px;
    font-size: 13px; outline: none;
}
.filters-bar select:focus, .filters-bar input:focus {
    border-color: var(--st-save);
}
.filters-bar input { flex: 1; min-width: 140px; }

/* ── Type badge ───────────────────────────────────────────────── */
.type-badge {
    display: inline-block; font-size: 10px; font-weight: 700;
    text-transform: uppercase; letter-spacing: .5px;
    padding: 2px 7px; border-radius: 4px;
}
.type-badge[data-type="rss"]     { background: rgba(34,197,94,.15);  color: var(--type-rss); }
.type-badge[data-type="sitemap"] { background: rgba(168,85,247,.15); color: var(--type-sitemap); }
.type-badge[data-type="podcast"] { background: rgba(249,115,22,.15); color: var(--type-podcast); }

/* ── Review badge ─────────────────────────────────────────────── */
.review-badge {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 10px; font-weight: 600; text-transform: uppercase;
}
.review-badge::before {
    content: ""; width: 6px; height: 6px; border-radius: 50%;
}
.review-badge[data-status="pass"]::before { background: var(--st-pass); }
.review-badge[data-status="save"]::before { background: var(--st-save); }
.review-badge[data-status="star"]::before { background: var(--st-star); }
.review-badge[data-status="pass"] { color: var(--st-pass); }
.review-badge[data-status="save"] { color: var(--st-save); }
.review-badge[data-status="star"] { color: var(--st-star); }

/* ── Article list (full-width) ───────────────────────────────── */
#article-list {
    overflow-y: auto;
    height: calc(100vh - 95px);
    scrollbar-width: thin; scrollbar-color: var(--border) transparent;
}
.article-row {
    display: grid;
    grid-template-columns: 78px 56px 120px 1fr 52px;
    gap: 8px; align-items: center;
    padding: 9px 14px;
    border-bottom: 1px solid var(--border);
    cursor: pointer; transition: background .1s;
    font-size: 13px;
}
.article-row:hover { background: var(--bg-hover); }
.article-row.reviewed { opacity: .45; }
.article-row.reviewed:hover { opacity: .7; }
.article-row.selected { background: var(--bg-hover); opacity: 1; }
.article-row.reviewed.selected { opacity: 1; }

.article-row .date { color: var(--text-muted); font-size: 12px; font-variant-numeric: tabular-nums; }
.article-row .source-name { color: var(--text-muted); font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.article-row .title { font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* ── Drawer ───────────────────────────────────────────────────── */
.drawer-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,.3);
    z-index: 150; opacity: 0; pointer-events: none;
    transition: opacity .25s;
}
.drawer {
    position: fixed; top: 0; right: 0; bottom: 0;
    width: 520px; max-width: 100vw;
    background: var(--bg-card); border-left: 1px solid var(--border);
    z-index: 160; display: flex; flex-direction: column;
    transform: translateX(100%);
    transition: transform .3s cubic-bezier(.4,0,.2,1);
    box-shadow: -4px 0 24px rgba(0,0,0,.15);
}
.drawer.open { transform: translateX(0); }

.drawer-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 20px; border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.drawer-body {
    flex: 1; overflow-y: auto; padding: 24px;
    scrollbar-width: thin; scrollbar-color: var(--border) transparent;
}
.drawer-footer {
    display: flex; justify-content: center; gap: 14px;
    padding: 16px 24px 20px; border-top: 1px solid var(--border);
    flex-shrink: 0; position: relative;
}
.drawer-nav { display: flex; align-items: center; gap: 10px; }
.drawer-nav-btn, .drawer-close {
    background: none; border: 1px solid var(--border); color: var(--text-muted);
    width: 32px; height: 32px; border-radius: 6px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; transition: all .15s;
}
.drawer-nav-btn:hover, .drawer-close:hover { color: var(--text); background: var(--bg-hover); }
.drawer-nav-btn:disabled { opacity: .3; cursor: default; }
.drawer-close { font-size: 20px; }
.drawer-counter { font-size: 13px; color: var(--text-muted); min-width: 60px; text-align: center; }

/* ── Card inside drawer ──────────────────────────────────────── */
.drawer-card {
    position: relative;
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 12px; padding: 28px 32px;
    transition: transform .3s ease, opacity .3s ease;
    cursor: grab; user-select: none;
}
.drawer-card.dragging { transition: none; cursor: grabbing; }
.drawer-card.entering { animation: cardIn .25s ease-out; }
.drawer-card.swipe-left  { transform: translateX(-120%) rotate(-8deg); opacity: 0; pointer-events: none; }
.drawer-card.swipe-right { transform: translateX(120%) rotate(8deg); opacity: 0; pointer-events: none; }
.drawer-card.swipe-up    { transform: translateY(-120%); opacity: 0; pointer-events: none; }

@keyframes cardIn {
    from { opacity: 0; transform: scale(.96) translateY(8px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
}

/* ── Drag direction hints ────────────────────────────────────── */
.drag-hint {
    position: absolute; top: 16px; padding: 6px 16px;
    border-radius: 6px; font-size: 13px; font-weight: 700;
    text-transform: uppercase; letter-spacing: .5px;
    opacity: 0; transition: opacity .15s; z-index: 10;
    pointer-events: none;
}
.drag-hint-pass { left: 16px; color: var(--st-pass); border: 2px solid var(--st-pass); }
.drag-hint-save { right: 16px; color: var(--st-save); border: 2px solid var(--st-save); }
.drag-hint-star { left: 50%; transform: translateX(-50%); color: var(--st-star); border: 2px solid var(--st-star); }

/* ── Markdown content ─────────────────────────────────────────── */
.md h2 { font-size: 15px; font-weight: 700; margin: 18px 0 8px; color: var(--text); }
.md h3 { font-size: 14px; font-weight: 600; margin: 14px 0 6px; }
.md ul, .md ol { padding-left: 20px; }
.md li { margin-bottom: 5px; font-size: 14px; line-height: 1.7; }
.md strong { color: var(--text); font-weight: 700; }
.md p { margin-bottom: 8px; font-size: 14px; }
.md a { color: var(--st-save); }

/* ── Two-tier summary ────────────────────────────────────────── */
.card-summary-headline {
    font-size: 15px; line-height: 1.6; font-weight: 500;
    color: var(--text); margin-bottom: 16px;
}
.card-summary-headline p { font-size: 15px; margin-bottom: 0; }
.card-summary-details {
    position: relative;
    border-top: 1px solid var(--border); padding-top: 14px;
}
.card-summary-details .md h2:first-child { margin-top: 0; }
.card-regen-bar {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 12px;
}
.regen-btn, .save-btn {
    padding: 4px 10px; border-radius: 5px; border: 1px solid var(--border);
    font-size: 11px; font-weight: 600; cursor: pointer; transition: all .12s;
    background: var(--bg); color: var(--text-muted);
}
.regen-btn:hover, .save-btn:hover { background: var(--bg-hover); color: var(--text); }
.save-btn { color: var(--st-save); border-color: var(--st-save); }
.save-btn:hover { background: var(--st-save); color: #fff; }
.save-btn.saved { background: var(--st-save); color: #fff; cursor: default; opacity: .7; }
.regen-btn:disabled { opacity: .5; cursor: not-allowed; }
.regen-spinner {
    display: inline-block; width: 12px; height: 12px;
    border: 2px solid var(--border); border-top-color: var(--text);
    border-radius: 50%; animation: spin .6s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Card header / meta / body ───────────────────────────────── */
.card-header { margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.card-title  { font-size: 20px; font-weight: 700; line-height: 1.35; margin-bottom: 10px; }
.card-meta   { display: flex; justify-content: space-between; align-items: center; color: var(--text-muted); font-size: 13px; flex-wrap: wrap; gap: 6px; }
.card-body {
    font-size: 14px; line-height: 1.8;
}

/* ── Action buttons ───────────────────────────────────────────── */
.action-btn {
    flex: 1; max-width: 170px; padding: 14px 20px;
    border: 2px solid var(--border); border-radius: 10px;
    font-size: 15px; font-weight: 700; cursor: pointer;
    transition: all .12s; display: flex; flex-direction: column;
    align-items: center; gap: 3px; background: var(--bg);
}
.action-btn kbd { font-size: 10px; color: var(--text-muted); font-family: inherit; font-weight: 400; }
.action-btn:hover { transform: scale(1.05); }
.action-btn:active { transform: scale(.97); }

.action-pass { color: var(--st-pass); border-color: var(--st-pass); }
.action-pass:hover { background: var(--bg-hover); }
.action-save { color: var(--st-save); border-color: var(--st-save); }
.action-save:hover { background: var(--bg-hover); }
.action-star { color: var(--st-star); border-color: var(--st-star); }
.action-star:hover { background: var(--bg-hover); }
.action-btn.active-status { background: var(--bg-hover); }

.action-undo {
    flex: 0 0 auto !important; width: 48px; max-width: 48px !important;
    color: var(--text-muted) !important; border-color: var(--border) !important;
    padding: 14px 0 !important;
    transition: all .15s;
}
.action-undo:hover { color: var(--text) !important; background: var(--bg-hover); }
.action-undo.disabled { opacity: 0.25; pointer-events: none; }

/* ── Empty state ──────────────────────────────────────────────── */
.empty-state {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; padding: 80px 24px; color: var(--text-muted);
    text-align: center;
}
.empty-state .empty-icon { font-size: 48px; margin-bottom: 16px; }
.empty-state h2 { font-size: 20px; color: var(--text); margin-bottom: 8px; }
.empty-state p { font-size: 14px; margin-bottom: 20px; }
.empty-state button {
    background: var(--bg-card); border: 1px solid var(--border);
    color: var(--text); padding: 8px 20px; border-radius: 6px;
    cursor: pointer; font-size: 13px;
}
.empty-state button:hover { background: var(--bg-hover); }

/* ── Drawer empty state ──────────────────────────────────────── */
.drawer-empty {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; padding: 60px 24px; color: var(--text-muted);
    text-align: center; min-height: 200px;
}
.drawer-empty .empty-icon { font-size: 40px; margin-bottom: 12px; }
.drawer-empty h3 { font-size: 17px; color: var(--text); margin-bottom: 6px; }
.drawer-empty p { font-size: 13px; }

/* ── Responsive ───────────────────────────────────────────────── */
@media (max-width: 768px) {
    .article-row {
        grid-template-columns: 1fr;
        gap: 3px; padding: 10px 16px;
    }
    .article-row .date { font-size: 11px; }
    .article-row .source-name { font-size: 11px; }
    .article-row .title { white-space: normal; }

    .drawer { width: 100vw; max-width: 100vw; }
    .drawer-backdrop.open { opacity: 1; pointer-events: auto; }
    .drawer-card { padding: 16px; border-radius: 8px; }
    .drawer-footer { gap: 8px; padding: 12px 16px 16px; }
    .action-btn { padding: 12px 14px; font-size: 14px; }
    .action-btn kbd { display: none; }
    .action-undo { padding: 12px 0 !important; width: 42px; max-width: 42px !important; }

    .card-title { font-size: 17px; }
    .filters-bar { padding: 10px 16px; }
    .filters-bar select, .filters-bar input { font-size: 12px; padding: 6px 8px; }
    #header { padding: 8px 16px; gap: 4px; }
    .branch-select { max-width: 130px; font-size: 11px; }
}
</style>
</head>
<body>

<!-- ── Branch hot-loader: fetch app code from non-main branches ─ -->
<script>
(function() {
    // Already on a blob URL (properly hot-loaded) — just render
    if (location.protocol === 'blob:') return;

    // Staleness guard: auto-reset to main if branch selection is older than 24h
    var BRANCH_TTL = 24 * 60 * 60 * 1000;
    function isBranchStale() {
        var ts = localStorage.getItem('review-branch-ts');
        if (!ts) return true;
        return (Date.now() - Number(ts)) > BRANCH_TTL;
    }
    function resetToMain() {
        localStorage.setItem('review-branch', 'main');
        localStorage.removeItem('review-branch-ts');
    }

    function loadBranchBlob(branch, onError) {
        document.documentElement.style.visibility = 'hidden';
        fetch('https://raw.githubusercontent.com/rozenborg/sources/'
            + encodeURIComponent(branch) + '/docs/index.html?_=' + Date.now())
            .then(function(r) { if (!r.ok) throw new Error(r.status); return r.text(); })
            .then(function(h) {
                var blob = new Blob([h], {type: 'text/html'});
                location.replace(URL.createObjectURL(blob));
            })
            .catch(function() {
                document.documentElement.style.visibility = '';
                if (onError) onError();
            });
    }

    // After document.write by main's hot-loader — redirect to blob for proper viewport
    if (sessionStorage.getItem('__bl')) {
        sessionStorage.removeItem('__bl');
        var b = localStorage.getItem('review-branch');
        if (b && b !== 'main') {
            if (isBranchStale()) { resetToMain(); return; }
            window.__pendingBlobRedirect = true;
            sessionStorage.setItem('__pages_url', location.href);
            loadBranchBlob(b);
        }
        return;
    }

    // Normal hot-load (when this IS the initial page, e.g., after merging to main)
    var b = localStorage.getItem('review-branch');
    if (!b || b === 'main') return;
    if (isBranchStale()) { resetToMain(); return; }
    sessionStorage.setItem('__bl', '1');
    loadBranchBlob(b, function() { sessionStorage.removeItem('__bl'); });
})();
</script>

<!-- ── Settings overlay ────────────────────────────────────────── -->
<div class="settings-overlay" id="settings-overlay" onclick="if(event.target===this)closeSettings()">
    <div class="settings-panel">
        <h2>Settings</h2>
        <label for="cfg-worker-url">Reviews API URL</label>
        <input type="text" id="cfg-worker-url" placeholder="https://reviews-api.yourdomain.workers.dev">
        <label for="cfg-auth-token">Auth Token</label>
        <input type="password" id="cfg-auth-token" placeholder="Your shared secret">
        <hr style="border:none;border-top:1px solid var(--border);margin:14px 0">
        <label for="cfg-summarize-url">Summarize API URL</label>
        <input type="text" id="cfg-summarize-url" placeholder="https://summarize-api.yourdomain.workers.dev">
        <label for="cfg-anthropic-key">Anthropic API Key</label>
        <input type="password" id="cfg-anthropic-key" placeholder="sk-ant-...">
        <label for="cfg-github-token">GitHub Token <span style="font-size:11px;opacity:.6">(for saving summaries)</span></label>
        <input type="password" id="cfg-github-token" placeholder="ghp_...">
        <div class="settings-status" id="settings-status"></div>
        <div class="settings-actions">
            <button onclick="closeSettings()">Cancel</button>
            <button class="primary" onclick="saveSettings()">Save</button>
        </div>
    </div>
</div>

<!-- ── Header ─────────────────────────────────────────────────── -->
<header id="header">
    <div class="header-row">
        <div style="display:flex;align-items:center;gap:12px">
            <h1>Sourcerer</h1>
            <select class="branch-select" id="branch-select" onchange="onBranchChange()" title="Select branch">
                <option value="main">main</option>
            </select>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
            <span id="review-counter" class="review-counter"></span>
            <button class="nav-btn" id="btn-review" onclick="openDrawerReview()">Review</button>
            <button class="settings-toggle" id="settings-btn" onclick="openSettings()" title="Settings">&#9881;</button>
            <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()" title="Toggle light/dark mode">&#9728;</button>
        </div>
    </div>
</header>

<!-- ── Warning banner (shown when Worker not configured) ──────── -->
<div class="warning-banner" id="warning-banner">
    Reviews are stored locally only. <a href="#" onclick="event.preventDefault();openSettings()">Configure the Reviews API</a> to sync across devices.
</div>

<!-- ── Loading banner ─────────────────────────────────────────── -->
<div class="loading-banner" id="loading-banner">Loading content from GitHub...</div>

<!-- ── Browse view (main view) ────────────────────────────────── -->
<main id="view-browse" class="view">
    <div class="filters-bar" id="filters-bar">
        <select id="filter-source" onchange="applyFilters()">
            <option value="">All Sources</option>
        </select>
        <select id="filter-type" onchange="applyFilters()">
            <option value="">All Types</option>
            <option value="rss">RSS</option>
            <option value="sitemap">Sitemap</option>
            <option value="podcast">Podcast</option>
        </select>
        <select id="filter-status" onchange="applyFilters()">
            <option value="">All Status</option>
            <option value="unreviewed">Unreviewed</option>
            <option value="pass">Pass</option>
            <option value="save">Save</option>
            <option value="star">Star</option>
        </select>
        <input type="text" id="filter-search" placeholder="Search titles..." oninput="renderBrowseList()">
    </div>
    <div id="article-list"></div>
</main>

<!-- ── Drawer (slides in from right) ─────────────────────────── -->
<div class="drawer-backdrop" id="drawer-backdrop"></div>
<aside class="drawer" id="drawer">
    <div class="drawer-header">
        <div class="drawer-nav">
            <button class="drawer-nav-btn" id="drawer-prev" onclick="drawerNavigate(-1)" title="Previous (K)">&#8592;</button>
            <span class="drawer-counter" id="drawer-counter"></span>
            <button class="drawer-nav-btn" id="drawer-next" onclick="drawerNavigate(1)" title="Next (J)">&#8594;</button>
        </div>
        <button class="drawer-close" id="drawer-close" onclick="closeDrawer()" title="Close (Esc)">&times;</button>
    </div>
    <div class="drawer-body" id="drawer-body"></div>
    <div class="drawer-footer" id="drawer-footer">
        <button class="action-btn action-undo disabled" id="drawer-undo" onclick="undoLastAction()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10h10a5 5 0 0 1 0 10H12"/><polyline points="7 14 3 10 7 6"/></svg><kbd>Z</kbd></button>
        <button class="action-btn action-pass" id="da-pass" onclick="drawerAction('pass')">Pass<kbd>&#8592; / 1</kbd></button>
        <button class="action-btn action-star" id="da-star" onclick="drawerAction('star')">Star<kbd>&#8593; / 3</kbd></button>
        <button class="action-btn action-save" id="da-save" onclick="drawerAction('save')">Save<kbd>&#8594; / 2</kbd></button>
    </div>
</aside>

<script>
/* ══════════════════════════════════════════════════════════════
   CONFIGURATION
   ══════════════════════════════════════════════════════════════ */
const GITHUB_OWNER = 'rozenborg';
const GITHUB_REPO  = 'sources';
const GITHUB_API   = 'https://api.github.com';
const RAW_BASE     = 'https://raw.githubusercontent.com';

/* ── State ────────────────────────────────────────────────────── */
let allArticles = [];
let browseArticles = [];
let filteredArticles = [];
let selectedIdx = -1;
let animating = false;
let undoStack = [];
let feedsMap = {};
let reviewsData = {};
let currentBranch = localStorage.getItem('review-branch') || 'main';
let workerUrl = localStorage.getItem('review-worker-url') || '';
let authToken = localStorage.getItem('review-auth-token') || '';
let useWorker = false;

/* ── Drawer state ────────────────────────────────────────────── */
let drawerOpen = false;
let drawerMode = 'single'; // 'single' or 'review'
let drawerIdx = -1;         // index into filteredArticles

/* ── Helpers ──────────────────────────────────────────────────── */
function esc(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
}
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

/* ── Summary rendering ───────────────────────────────────────── */
function renderSummaryBody(body, artPath) {
    const html = marked.parse(body || '');
    const hrIdx = html.indexOf('<hr');

    let regenBar = '';
    if (localStorage.getItem('sourcerer-anthropic-key')) {
        const safePath = artPath.replace(/'/g, "\\'");
        regenBar =
            `<div class="card-regen-bar">` +
                `<button class="regen-btn" onclick="regenerateSummary('${safePath}', this)" title="Regenerate summary">&#8635; Regenerate</button>` +
            `</div>`;
    }

    if (hrIdx === -1) {
        return regenBar + `<div class="md">${html}</div>`;
    }

    const hrEnd = html.indexOf('>', hrIdx) + 1;
    const headline = html.substring(0, hrIdx).trim();
    const details  = html.substring(hrEnd).trim();

    return regenBar +
        `<div class="card-summary-headline">${headline}</div>` +
        `<div class="card-summary-details"><div class="md">${details}</div></div>`;
}

/* ── Regeneration ────────────────────────────────────────────── */
async function regenerateSummary(artPath, btn) {
    const art = allArticles.find(a => a.path === artPath);
    if (!art) return;

    const anthropicKey = localStorage.getItem('sourcerer-anthropic-key') || '';
    const summarizeUrl = localStorage.getItem('sourcerer-summarize-url') || '';
    if (!anthropicKey || !summarizeUrl) {
        alert('Configure Anthropic API Key and Summarize API URL in Settings.');
        return;
    }

    btn.disabled = true;
    const origText = btn.innerHTML;
    btn.innerHTML = '<span class="regen-spinner"></span> Regenerating...';

    try {
        const resp = await fetch(summarizeUrl + '/summarize', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-Anthropic-Key': anthropicKey,
            },
            body: JSON.stringify({
                url: art.url,
                title: art.title,
                source_type: art.type,
            }),
        });

        if (!resp.ok) {
            const err = await resp.json().catch(() => ({}));
            throw new Error(err.error || 'HTTP ' + resp.status);
        }

        const data = await resp.json();
        art.body = data.body;
        art._regenerated = true;

        // Re-render the card in the drawer
        rerenderActiveCard(art);
    } catch (e) {
        alert('Regeneration failed: ' + e.message);
    } finally {
        btn.disabled = false;
        btn.innerHTML = origText;
    }
}

async function saveSummary(artPath, btn) {
    const art = allArticles.find(a => a.path === artPath);
    if (!art) return;

    const ghToken = localStorage.getItem('sourcerer-github-token') || '';
    if (!ghToken) {
        alert('Configure a GitHub Token in Settings to save summaries.');
        return;
    }

    btn.disabled = true;
    btn.textContent = 'Saving...';

    try {
        // Get current file content + SHA from Contents API (single request)
        const fileResp = await fetch(
            `${GITHUB_API}/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${art.path}?ref=${encodeURIComponent(currentBranch)}`,
            { headers: { 'Authorization': 'token ' + ghToken } }
        );
        if (!fileResp.ok) throw new Error('Could not fetch file: HTTP ' + fileResp.status);
        const fileData = await fileResp.json();
        const rawText = decodeURIComponent(escape(atob(fileData.content)));

        // Extract frontmatter block, preserve it, replace body
        const parsed = parseFrontmatter(rawText);
        if (!parsed) throw new Error('Could not parse frontmatter');
        const fmEnd = rawText.indexOf('---', rawText.indexOf('---') + 3) + 3;
        const newContent = `${rawText.substring(0, fmEnd)}\n\n${art.body}\n`;

        const updateResp = await fetch(
            `${GITHUB_API}/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${art.path}`,
            {
                method: 'PUT',
                headers: {
                    'Authorization': 'token ' + ghToken,
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    message: `Update summary: ${art.title}`,
                    content: btoa(unescape(encodeURIComponent(newContent))),
                    sha: fileData.sha,
                    branch: currentBranch,
                }),
            }
        );
        if (!updateResp.ok) throw new Error('Save failed: HTTP ' + updateResp.status);

        art._regenerated = false;
        btn.textContent = 'Saved';
        btn.classList.add('saved');
        rerenderActiveCard(art);
    } catch (e) {
        alert('Save failed: ' + e.message);
        btn.disabled = false;
        btn.textContent = 'Save';
    }
}

function renderSaveBtn(art) {
    return art._regenerated
        ? `<button class="save-btn" onclick="event.stopPropagation();saveSummary('${esc(art.path)}', this)" style="margin-top:8px">Save to repo</button>`
        : '';
}

function rerenderActiveCard(art) {
    if (drawerOpen && drawerIdx >= 0 && drawerIdx < filteredArticles.length) {
        if (filteredArticles[drawerIdx].path === art.path) {
            renderDrawerCard();
        }
    }
}

function setLoading(on) {
    document.getElementById('loading-banner').classList.toggle('active', on);
}

/* ══════════════════════════════════════════════════════════════
   SETTINGS
   ══════════════════════════════════════════════════════════════ */
function openSettings() {
    document.getElementById('cfg-worker-url').value = workerUrl;
    document.getElementById('cfg-auth-token').value = authToken;
    document.getElementById('cfg-summarize-url').value = localStorage.getItem('sourcerer-summarize-url') || '';
    document.getElementById('cfg-anthropic-key').value = localStorage.getItem('sourcerer-anthropic-key') || '';
    document.getElementById('cfg-github-token').value = localStorage.getItem('sourcerer-github-token') || '';
    document.getElementById('settings-status').textContent = '';
    document.getElementById('settings-overlay').classList.add('open');
}
function closeSettings() {
    document.getElementById('settings-overlay').classList.remove('open');
}
async function saveSettings() {
    const url = document.getElementById('cfg-worker-url').value.trim().replace(/\/+$/, '');
    const token = document.getElementById('cfg-auth-token').value.trim();
    const statusEl = document.getElementById('settings-status');

    if (url && token) {
        statusEl.textContent = 'Testing connection...';
        statusEl.className = 'settings-status';
        try {
            const r = await fetch(url + '/reviews', {
                headers: { 'X-Auth-Token': token },
            });
            if (!r.ok) throw new Error('HTTP ' + r.status);
            statusEl.textContent = 'Connected successfully!';
            statusEl.className = 'settings-status ok';
        } catch (e) {
            statusEl.textContent = 'Connection failed: ' + e.message;
            statusEl.className = 'settings-status err';
            return;
        }
    }

    workerUrl = url;
    authToken = token;
    localStorage.setItem('review-worker-url', url);
    localStorage.setItem('review-auth-token', token);
    useWorker = !!(url && token);
    updateWarningBanner();

    const summarizeUrl = document.getElementById('cfg-summarize-url').value.trim().replace(/\/+$/, '');
    const anthropicKey = document.getElementById('cfg-anthropic-key').value.trim();
    const ghToken = document.getElementById('cfg-github-token').value.trim();
    localStorage.setItem('sourcerer-summarize-url', summarizeUrl);
    localStorage.setItem('sourcerer-anthropic-key', anthropicKey);
    localStorage.setItem('sourcerer-github-token', ghToken);

    if (useWorker) {
        await fetchReviews();
        mergeReviewsIntoArticles();
        refreshStats();
        renderBrowseList();
    }

    await sleep(600);
    closeSettings();
}

function updateWarningBanner() {
    document.getElementById('warning-banner').classList.toggle('active', !useWorker);
}

/* ══════════════════════════════════════════════════════════════
   GITHUB API: BRANCHES
   ══════════════════════════════════════════════════════════════ */
async function loadBranches() {
    const sel = document.getElementById('branch-select');
    try {
        const r = await fetch(`${GITHUB_API}/repos/${GITHUB_OWNER}/${GITHUB_REPO}/branches?per_page=100`);
        if (!r.ok) throw new Error('HTTP ' + r.status);
        const branches = await r.json();
        sel.innerHTML = '';
        branches.forEach(b => {
            const o = document.createElement('option');
            o.value = b.name;
            o.textContent = b.name;
            if (b.name === currentBranch) o.selected = true;
            sel.appendChild(o);
        });
        if (!branches.some(b => b.name === currentBranch)) {
            currentBranch = 'main';
            sel.value = 'main';
            localStorage.setItem('review-branch', 'main');
            localStorage.removeItem('review-branch-ts');
        }
    } catch (e) {
        console.error('Failed to load branches:', e);
    }
}

async function onBranchChange() {
    currentBranch = document.getElementById('branch-select').value;
    localStorage.setItem('review-branch', currentBranch);
    localStorage.setItem('review-branch-ts', String(Date.now()));
    sessionStorage.removeItem('__bl');
    var pagesUrl = sessionStorage.getItem('__pages_url');
    if (pagesUrl) {
        sessionStorage.removeItem('__pages_url');
        location.replace(pagesUrl);
    } else {
        location.reload();
    }
}

/* ══════════════════════════════════════════════════════════════
   GITHUB API: CONTENT
   ══════════════════════════════════════════════════════════════ */
function rawUrl(path) {
    return `${RAW_BASE}/${GITHUB_OWNER}/${GITHUB_REPO}/${encodeURIComponent(currentBranch)}/${path}`;
}

function parseFrontmatter(text) {
    const first = text.indexOf('---');
    if (first === -1) return null;
    const second = text.indexOf('---', first + 3);
    if (second === -1) return null;

    const frontmatter = text.substring(first + 3, second);
    const body = text.substring(second + 3).trim();

    try {
        const meta = jsyaml.load(frontmatter);
        return { meta, body };
    } catch {
        return null;
    }
}

async function loadContent() {
    setLoading(true);
    allArticles = [];

    try {
        const treeUrl = `${GITHUB_API}/repos/${GITHUB_OWNER}/${GITHUB_REPO}/git/trees/${encodeURIComponent(currentBranch)}?recursive=1`;
        const treeResp = await fetch(treeUrl);
        if (!treeResp.ok) throw new Error('Failed to fetch file tree: HTTP ' + treeResp.status);
        const treeData = await treeResp.json();

        const contentFiles = treeData.tree.filter(
            f => f.type === 'blob' && f.path.startsWith('content/') && f.path.endsWith('.md')
        );

        try {
            const feedsResp = await fetch(rawUrl('feeds.yaml'));
            if (feedsResp.ok) {
                const feedsText = await feedsResp.text();
                const feedsConfig = jsyaml.load(feedsText);
                feedsMap = {};
                (feedsConfig.sources || []).forEach(s => { feedsMap[s.id] = s; });
            }
        } catch (e) {
            console.warn('Failed to load feeds.yaml:', e);
        }

        const BATCH_SIZE = 20;
        for (let i = 0; i < contentFiles.length; i += BATCH_SIZE) {
            const batch = contentFiles.slice(i, i + BATCH_SIZE);
            const results = await Promise.all(
                batch.map(async f => {
                    try {
                        const resp = await fetch(rawUrl(f.path));
                        if (!resp.ok) return null;
                        const text = await resp.text();
                        const parsed = parseFrontmatter(text);
                        if (!parsed || !parsed.meta) return null;

                        const m = parsed.meta;
                        return {
                            path: f.path,
                            title: m.title || f.path.split('/').pop().replace('.md', '').replace(/--/g, ' — ').replace(/-/g, ' '),
                            source: m.source || '',
                            source_name: '',
                            url: m.url || '',
                            date: m.date ? String(m.date) : '',
                            type: m.type || 'unknown',
                            body: parsed.body,
                            review_status: null,
                            reviewed_at: null,
                        };
                    } catch { return null; }
                })
            );
            allArticles.push(...results.filter(Boolean));
        }

        allArticles.forEach(a => {
            const src = feedsMap[a.source];
            a.source_name = src ? (src.name || a.source) : a.source;
        });

        mergeReviewsIntoArticles();
        populateSourceFilter();

        browseArticles = [...allArticles];
        applyFilters();
        refreshStats();

    } catch (e) {
        console.error('Failed to load content:', e);
        document.getElementById('article-list').innerHTML =
            '<div class="empty-state"><h2>Failed to load content</h2><p>' + esc(e.message) + '</p>' +
            '<button onclick="loadContent()">Retry</button></div>';
    } finally {
        setLoading(false);
    }
}

function mergeReviewsIntoArticles() {
    allArticles.forEach(a => {
        const review = reviewsData[a.path];
        a.review_status = review ? review.status : null;
        a.reviewed_at = review ? review.reviewed_at : null;
    });
}

function populateSourceFilter() {
    const sel = document.getElementById('filter-source');
    const current = sel.value;
    sel.innerHTML = '<option value="">All Sources</option>';

    const sourceCounts = {};
    allArticles.forEach(a => {
        sourceCounts[a.source] = (sourceCounts[a.source] || 0) + 1;
    });

    const sources = Object.keys(feedsMap).map(id => ({
        id,
        name: feedsMap[id].name || id,
        count: sourceCounts[id] || 0,
    })).sort((a, b) => a.name.localeCompare(b.name));

    sources.forEach(s => {
        const o = document.createElement('option');
        o.value = s.id;
        o.textContent = s.name + ' (' + s.count + ')';
        sel.appendChild(o);
    });

    sel.value = current;
}

/* ══════════════════════════════════════════════════════════════
   REVIEWS API (Cloudflare Worker) + localStorage fallback
   ══════════════════════════════════════════════════════════════ */
async function fetchReviews() {
    if (useWorker) {
        try {
            const r = await fetch(workerUrl + '/reviews', {
                headers: { 'X-Auth-Token': authToken },
            });
            if (r.ok) {
                const data = await r.json();
                reviewsData = data.reviews || {};
                localStorage.setItem('review-data', JSON.stringify(reviewsData));
                return;
            }
        } catch (e) {
            console.warn('Worker fetch failed, using localStorage:', e);
        }
    }

    try {
        reviewsData = JSON.parse(localStorage.getItem('review-data') || '{}');
    } catch { reviewsData = {}; }
}

async function saveReview(path, status) {
    if (status === null) {
        delete reviewsData[path];
    } else {
        reviewsData[path] = {
            status,
            reviewed_at: new Date().toISOString(),
        };
    }

    localStorage.setItem('review-data', JSON.stringify(reviewsData));

    if (useWorker) {
        try {
            await fetch(workerUrl + '/review', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-Auth-Token': authToken,
                },
                body: JSON.stringify({ path, status }),
            });
        } catch (e) {
            console.warn('Worker save failed:', e);
        }
    }
}

/* ── Stats ────────────────────────────────────────────────────── */
function refreshStats() {
    const total = allArticles.length;
    let reviewed = 0;
    allArticles.forEach(a => { if (a.review_status) reviewed++; });
    document.getElementById('review-counter').textContent = reviewed + '/' + total;
}

/* ══════════════════════════════════════════════════════════════
   BROWSE VIEW
   ══════════════════════════════════════════════════════════════ */

function applyFilters() {
    const src  = document.getElementById('filter-source').value;
    const typ  = document.getElementById('filter-type').value;
    const stat = document.getElementById('filter-status').value;

    browseArticles = allArticles.filter(a => {
        if (src && a.source !== src) return false;
        if (typ && a.type !== typ) return false;
        if (stat) {
            if (stat === 'unreviewed' && a.review_status !== null) return false;
            if (stat !== 'unreviewed' && a.review_status !== stat) return false;
        }
        return true;
    });

    selectedIdx = -1;
    renderBrowseList();

    // If drawer is open in review mode, reset to first unreviewed
    if (drawerOpen && drawerMode === 'review') {
        const nextIdx = findNextUnreviewed(-1);
        if (nextIdx >= 0) {
            drawerIdx = nextIdx;
            highlightRow(drawerIdx);
            renderDrawerCard();
        } else {
            renderDrawerEmpty();
        }
    }
}

function renderBrowseList() {
    const search = document.getElementById('filter-search').value.toLowerCase();
    const list = document.getElementById('article-list');
    list.innerHTML = '';

    // Sort: unreviewed first, then by date desc
    filteredArticles = [...browseArticles].sort((a, b) => {
        const ar = a.review_status ? 1 : 0;
        const br = b.review_status ? 1 : 0;
        if (ar !== br) return ar - br;
        return b.date.localeCompare(a.date);
    });

    if (search) {
        filteredArticles = filteredArticles.filter(a => a.title.toLowerCase().includes(search));
    }

    for (let i = 0; i < filteredArticles.length; i++) {
        list.appendChild(buildRow(filteredArticles[i], i));
    }

    if (filteredArticles.length === 0) {
        list.innerHTML = '<div class="empty-state"><p>No articles match your filters.</p></div>';
    }
}

function buildRow(art, idx) {
    const row = document.createElement('div');
    row.className = 'article-row' + (art.review_status ? ' reviewed' : '');
    row.dataset.idx = idx;
    row.innerHTML =
        `<span class="date">${esc(art.date)}</span>` +
        `<span class="type-badge" data-type="${art.type}">${art.type}</span>` +
        `<span class="source-name" title="${esc(art.source_name)}">${esc(art.source_name)}</span>` +
        `<span class="title" title="${esc(art.title)}">${esc(art.title)}</span>` +
        `<span>${art.review_status ? `<span class="review-badge" data-status="${art.review_status}">${art.review_status}</span>` : ''}</span>`;

    row.addEventListener('click', () => openDrawerSingle(idx));
    return row;
}

/* ══════════════════════════════════════════════════════════════
   DRAWER
   ══════════════════════════════════════════════════════════════ */

function openDrawer() {
    drawerOpen = true;
    document.getElementById('drawer').classList.add('open');
    document.getElementById('drawer-backdrop').classList.add('open');
}

function closeDrawer() {
    drawerOpen = false;
    drawerIdx = -1;
    document.getElementById('drawer').classList.remove('open');
    document.getElementById('drawer-backdrop').classList.remove('open');
    undoStack = [];
    updateUndoButton();
    // Clear row selection
    document.getElementById('article-list').querySelectorAll('.article-row').forEach(r => r.classList.remove('selected'));
}

function openDrawerSingle(idx) {
    if (idx < 0 || idx >= filteredArticles.length) return;
    drawerMode = 'single';
    drawerIdx = idx;
    selectedIdx = idx;
    highlightRow(idx);
    renderDrawerCard();
    if (!drawerOpen) openDrawer();
}

function openDrawerReview() {
    drawerMode = 'review';
    undoStack = [];
    updateUndoButton();

    const nextIdx = findNextUnreviewed(-1);
    if (nextIdx >= 0) {
        drawerIdx = nextIdx;
        selectedIdx = nextIdx;
        highlightRow(nextIdx);
        renderDrawerCard();
        openDrawer();
    } else {
        drawerIdx = -1;
        renderDrawerEmpty();
        openDrawer();
    }
}

function highlightRow(idx) {
    const list = document.getElementById('article-list');
    list.querySelectorAll('.article-row').forEach(r => r.classList.remove('selected'));
    const row = list.querySelector(`[data-idx="${idx}"]`);
    if (row) {
        row.classList.add('selected');
        row.scrollIntoView({ block: 'nearest' });
    }
}

function findNextUnreviewed(fromIdx) {
    // Search forward from fromIdx+1
    for (let i = fromIdx + 1; i < filteredArticles.length; i++) {
        if (!filteredArticles[i].review_status) return i;
    }
    // Wrap around
    for (let i = 0; i <= fromIdx; i++) {
        if (!filteredArticles[i].review_status) return i;
    }
    return -1;
}

function renderDrawerCard() {
    if (drawerIdx < 0 || drawerIdx >= filteredArticles.length) {
        renderDrawerEmpty();
        return;
    }

    const art = filteredArticles[drawerIdx];
    const body = document.getElementById('drawer-body');

    const statusBadge = art.review_status
        ? `<span class="review-badge" data-status="${art.review_status}">${art.review_status}</span>`
        : '';

    const summaryHtml = renderSummaryBody(art.body, art.path);
    const saveBtn = renderSaveBtn(art);

    body.innerHTML =
        `<div class="drawer-card entering" id="drawer-card">` +
            `<div class="drag-hint drag-hint-pass">Pass</div>` +
            `<div class="drag-hint drag-hint-save">Save</div>` +
            `<div class="drag-hint drag-hint-star">Star</div>` +
            `<div class="card-header">` +
                `<div class="card-title">${esc(art.title)}</div>` +
                `<div class="card-meta">` +
                    `<span class="type-badge" data-type="${art.type}">${art.type}</span>` +
                    `<span>${esc(art.source_name)}</span>` +
                    `<span>${art.date}</span>` +
                    `<a href="${esc(art.url)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">Open original &#8594;</a>` +
                    statusBadge +
                `</div>` +
            `</div>` +
            `<div class="card-body">${summaryHtml}${saveBtn}</div>` +
        `</div>`;

    updateDrawerActionButtons(art.review_status);
    updateDrawerCounter();
    setupCardDrag(document.getElementById('drawer-card'));
}

function renderDrawerEmpty() {
    const body = document.getElementById('drawer-body');
    body.innerHTML =
        `<div class="drawer-empty">` +
            `<div class="empty-icon">&#10003;</div>` +
            `<h3>All caught up!</h3>` +
            `<p>No unreviewed articles remaining.</p>` +
        `</div>`;
    updateDrawerCounter();
    document.getElementById('drawer-footer').style.display = 'none';
}

function updateDrawerActionButtons(status) {
    document.getElementById('drawer-footer').style.display = '';
    ['pass', 'star', 'save'].forEach(s => {
        const btn = document.getElementById('da-' + s);
        if (btn) btn.classList.toggle('active-status', status === s);
    });
}

function updateDrawerCounter() {
    const counter = document.getElementById('drawer-counter');
    const prevBtn = document.getElementById('drawer-prev');
    const nextBtn = document.getElementById('drawer-next');

    if (drawerMode === 'review') {
        const remaining = filteredArticles.filter(a => !a.review_status).length;
        counter.textContent = remaining + ' left';
        prevBtn.disabled = true;
        nextBtn.disabled = remaining <= 0;
    } else {
        if (drawerIdx >= 0 && filteredArticles.length > 0) {
            counter.textContent = (drawerIdx + 1) + '/' + filteredArticles.length;
        } else {
            counter.textContent = '';
        }
        prevBtn.disabled = drawerIdx <= 0;
        nextBtn.disabled = drawerIdx >= filteredArticles.length - 1;
    }
}

function updateRowBadge(idx, status) {
    const row = document.querySelector(`[data-idx="${idx}"]`);
    if (row) {
        const badgeCol = row.children[4];
        if (status) {
            badgeCol.innerHTML = `<span class="review-badge" data-status="${status}">${status}</span>`;
            row.classList.add('reviewed');
        } else {
            badgeCol.innerHTML = '';
            row.classList.remove('reviewed');
        }
    }
}

function drawerNavigate(direction) {
    if (drawerMode === 'review') {
        // In review mode, next goes to next unreviewed
        if (direction > 0) {
            const nextIdx = findNextUnreviewed(drawerIdx);
            if (nextIdx >= 0 && nextIdx !== drawerIdx) {
                drawerIdx = nextIdx;
                selectedIdx = nextIdx;
                highlightRow(nextIdx);
                renderDrawerCard();
            }
        }
        return;
    }

    // Single mode: navigate through all articles
    const newIdx = drawerIdx + direction;
    if (newIdx >= 0 && newIdx < filteredArticles.length) {
        drawerIdx = newIdx;
        selectedIdx = newIdx;
        highlightRow(newIdx);
        renderDrawerCard();
    }
}

async function drawerAction(status) {
    if (animating || drawerIdx < 0 || drawerIdx >= filteredArticles.length) return;
    animating = true;

    const card = document.getElementById('drawer-card');
    const art = filteredArticles[drawerIdx];

    // Track for undo
    undoStack.push({
        path: art.path,
        prevStatus: art.review_status || null,
        prevReviewedAt: art.reviewed_at || null,
        drawerIdx: drawerIdx,
    });
    updateUndoButton();

    // Animate card out
    const cls = { pass: 'swipe-left', save: 'swipe-right', star: 'swipe-up' }[status];
    if (card) card.classList.add(cls);

    // Save review
    saveReview(art.path, status).then(() => refreshStats());

    // Update local state
    art.review_status = status;
    art.reviewed_at = new Date().toISOString();
    const orig = allArticles.find(a => a.path === art.path);
    if (orig) { orig.review_status = status; orig.reviewed_at = art.reviewed_at; }

    // Update table row
    updateRowBadge(drawerIdx, status);

    await sleep(300);

    // Auto-advance to next unreviewed
    const nextIdx = findNextUnreviewed(drawerIdx);
    if (nextIdx >= 0 && nextIdx !== drawerIdx) {
        drawerIdx = nextIdx;
        selectedIdx = nextIdx;
        highlightRow(nextIdx);
        renderDrawerCard();
    } else if (nextIdx === drawerIdx && !filteredArticles[drawerIdx].review_status) {
        // Same article is still the only unreviewed
        renderDrawerCard();
    } else {
        // No more unreviewed
        if (drawerMode === 'review') {
            renderDrawerEmpty();
        } else {
            // In single mode, just re-render the current card with updated status
            renderDrawerCard();
        }
    }

    animating = false;
}

/* ── Card drag gestures ──────────────────────────────────────── */
let _dragMoveHandler = null, _dragUpHandler = null;
function setupCardDrag(card) {
    if (!card) return;
    // Clean up previous document-level listeners to prevent leaks
    if (_dragMoveHandler) document.removeEventListener('mousemove', _dragMoveHandler);
    if (_dragUpHandler) document.removeEventListener('mouseup', _dragUpHandler);

    let startX = 0, startY = 0, dx = 0, dy = 0;
    let isDragging = false, dragConfirmed = false;

    const hintPass = card.querySelector('.drag-hint-pass');
    const hintSave = card.querySelector('.drag-hint-save');
    const hintStar = card.querySelector('.drag-hint-star');

    function showHints(dx, dy) {
        const SHOW = 40;
        if (hintPass) hintPass.style.opacity = dx < -SHOW ? Math.min(1, (-dx - SHOW) / 60) : 0;
        if (hintSave) hintSave.style.opacity = dx > SHOW ? Math.min(1, (dx - SHOW) / 60) : 0;
        if (hintStar) hintStar.style.opacity = dy < -SHOW ? Math.min(1, (-dy - SHOW) / 60) : 0;
    }

    function onStart(x, y) {
        if (animating) return;
        startX = x; startY = y; dx = 0; dy = 0;
        isDragging = true; dragConfirmed = false;
        card.classList.add('dragging');
    }

    function onMove(x, y) {
        if (!isDragging) return;
        dx = x - startX;
        dy = y - startY;

        if (!dragConfirmed) {
            if (Math.abs(dy) > 12 && Math.abs(dy) > Math.abs(dx) * 1.5) {
                isDragging = false;
                card.classList.remove('dragging');
                card.style.transform = '';
                card.style.opacity = '';
                showHints(0, 0);
                return;
            }
            if (Math.abs(dx) > 12 || Math.abs(dy) > 12) {
                dragConfirmed = true;
            } else {
                return;
            }
        }

        const rotate = dx * 0.04;
        card.style.transform = `translate(${dx}px, ${Math.min(dy, 0)}px) rotate(${rotate}deg)`;
        card.style.opacity = Math.max(0.5, 1 - Math.abs(dx) / 500);
        showHints(dx, dy);
    }

    function onEnd() {
        if (!isDragging) return;
        isDragging = false;
        card.classList.remove('dragging');
        showHints(0, 0);

        const THRESHOLD = 100;
        if (Math.abs(dx) > THRESHOLD && Math.abs(dx) > Math.abs(dy)) {
            drawerAction(dx < 0 ? 'pass' : 'save');
        } else if (dy < -THRESHOLD && Math.abs(dy) > Math.abs(dx)) {
            drawerAction('star');
        } else {
            card.style.transform = '';
            card.style.opacity = '';
        }
    }

    card.addEventListener('mousedown', e => {
        if (e.target.tagName === 'A' || e.target.tagName === 'BUTTON') return;
        e.preventDefault();
        onStart(e.clientX, e.clientY);
    });

    _dragMoveHandler = e => { if (isDragging) onMove(e.clientX, e.clientY); };
    _dragUpHandler = () => { if (isDragging) onEnd(); };
    document.addEventListener('mousemove', _dragMoveHandler);
    document.addEventListener('mouseup', _dragUpHandler);

    card.addEventListener('touchstart', e => {
        if (e.target.tagName === 'A' || e.target.tagName === 'BUTTON') return;
        onStart(e.touches[0].clientX, e.touches[0].clientY);
    }, { passive: true });
    card.addEventListener('touchmove', e => {
        if (isDragging && dragConfirmed) e.preventDefault();
        onMove(e.touches[0].clientX, e.touches[0].clientY);
    }, { passive: false });
    card.addEventListener('touchend', () => onEnd(), { passive: true });
}

/* ── Undo ─────────────────────────────────────────────────────── */
function updateUndoButton() {
    const undoBtn = document.getElementById('drawer-undo');
    if (undoBtn) undoBtn.classList.toggle('disabled', undoStack.length === 0);
}

async function undoLastAction() {
    if (undoStack.length === 0 || animating) return;
    animating = true;

    const action = undoStack.pop();
    const { path, prevStatus, prevReviewedAt } = action;

    // Revert in allArticles
    const art = allArticles.find(a => a.path === path);
    if (art) {
        art.review_status = prevStatus;
        art.reviewed_at = prevReviewedAt;
    }

    // Persist reverted status
    await saveReview(path, prevStatus);
    refreshStats();

    // Revert in filteredArticles
    const fArt = filteredArticles.find(a => a.path === path);
    if (fArt) { fArt.review_status = prevStatus; fArt.reviewed_at = prevReviewedAt; }

    // Update table row
    updateRowBadge(action.drawerIdx, prevStatus);

    // Go back to the article that was undone
    drawerIdx = action.drawerIdx;
    selectedIdx = drawerIdx;
    highlightRow(drawerIdx);
    renderDrawerCard();

    updateUndoButton();
    animating = false;
}

/* ── Keyboard shortcuts ───────────────────────────────────────── */
document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;

    // Undo: z or Ctrl+Z (only when drawer is open)
    if (e.key === 'z' || (e.key === 'z' && (e.ctrlKey || e.metaKey))) {
        if (drawerOpen) {
            e.preventDefault();
            undoLastAction();
            return;
        }
    }

    if (drawerOpen) {
        switch (e.key) {
            case 'Escape':
                e.preventDefault();
                closeDrawer();
                break;
            case 'j': case 'ArrowDown':
                e.preventDefault();
                drawerNavigate(1);
                break;
            case 'k': case 'ArrowUp':
                if (e.key === 'ArrowUp') {
                    e.preventDefault();
                    drawerAction('star');
                } else {
                    e.preventDefault();
                    drawerNavigate(-1);
                }
                break;
            case 'ArrowLeft':  case '1': e.preventDefault(); drawerAction('pass'); break;
            case 'ArrowRight': case '2': e.preventDefault(); drawerAction('save'); break;
            case '3': e.preventDefault(); drawerAction('star'); break;
        }
        return;
    }

    // Drawer closed — table navigation
    switch (e.key) {
        case 'j': case 'ArrowDown':
            e.preventDefault();
            if (selectedIdx < filteredArticles.length - 1) {
                selectedIdx++;
                highlightRow(selectedIdx);
            }
            break;
        case 'k': case 'ArrowUp':
            e.preventDefault();
            if (selectedIdx > 0) {
                selectedIdx--;
                highlightRow(selectedIdx);
            }
            break;
        case 'Enter':
            e.preventDefault();
            if (selectedIdx >= 0) openDrawerSingle(selectedIdx);
            break;
        case 'r':
            e.preventDefault();
            openDrawerReview();
            break;
    }
});

/* ── Backdrop click (mobile close) ───────────────────────────── */
document.getElementById('drawer-backdrop').addEventListener('click', () => {
    if (drawerOpen) closeDrawer();
});

/* ── Theme toggle ─────────────────────────────────────────────── */
function applyTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    const btn = document.getElementById('theme-toggle');
    btn.innerHTML = theme === 'light' ? '&#9790;' : '&#9728;';
    btn.title = theme === 'light' ? 'Switch to dark mode' : 'Switch to light mode';
}
function toggleTheme() {
    const current = document.documentElement.getAttribute('data-theme') || 'dark';
    const next = current === 'dark' ? 'light' : 'dark';
    applyTheme(next);
    localStorage.setItem('review-theme', next);
}
applyTheme(localStorage.getItem('review-theme') || 'dark');

/* ── Init ─────────────────────────────────────────────────────── */
(async function init() {
    if (window.__pendingBlobRedirect) return;
    useWorker = !!(workerUrl && authToken);
    updateWarningBanner();

    await Promise.all([loadBranches(), fetchReviews()]);
    await loadContent();
})();
</script>
